openapi: 3.1.0
info:
  title: Morfoschools API
  version: 0.1.0
  description: Production rewrite API contract for Morfosis/Morfoschools.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is alive
  /readyz:
    get:
      summary: Readiness check
      responses:
        '200':
          description: Critical dependencies are ready
        '503':
          description: One or more dependencies are unavailable
  /api/v1/auth/login:
    post:
      summary: Login with seeded or production user credentials
      responses:
        '200': { description: Session established }
        '400': { description: Invalid request }
        '401': { description: Invalid credentials }
  /api/v1/auth/logout:
    post:
      summary: Revoke current browser session
      security:
        - morfoschools_session: []
        - morfoschools_csrf: []
      responses:
        '204': { description: Session revoked }
  /api/v1/auth/me:
    get:
      summary: Read current authenticated user, roles, permissions, tenant context
      security:
        - morfoschools_session: []
      responses:
        '200': { description: Current session context }
        '401': { description: Missing or invalid session }
  /api/v1/tenants/current/theme:
    get:
      summary: Read sanitized tenant theme bootstrap settings
      description: Returns preset, safe theme colors, optional logo URL, version, cache key, and CSS variable names for no-flicker bootstrap.
      security:
        - morfoschools_session: []
      responses:
        '200':
          description: Current tenant theme
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      theme:
                        $ref: '#/components/schemas/TenantTheme'
        '400': { description: Tenant context is required }
        '401': { description: Missing or invalid session }
components:
  securitySchemes:
    morfoschools_session:
      type: apiKey
      in: cookie
      name: morfoschools_session
    morfoschools_csrf:
      type: apiKey
      in: header
      name: X-CSRF-Token
  schemas:
    TenantTheme:
      type: object
      required: [tenantId, preset, primaryColor, accentColor, logoUrl, version, cacheKey, cssVariables]
      properties:
        tenantId: { type: string, format: uuid }
        preset: { type: string }
        primaryColor:
          type: string
          description: Safe hex or OKLCH color only; raw CSS fragments are rejected.
        accentColor:
          type: string
          description: Safe hex or OKLCH color only; raw CSS fragments are rejected.
        logoUrl:
          type: string
          description: Empty string or HTTPS URL.
        version: { type: integer }
        cacheKey:
          type: string
          description: Valkey key format tenant_theme:{tenantId}:v{version}.
        cssVariables:
          type: object
          additionalProperties: { type: string }
          description: Stable no-flicker bootstrap variables: --morfoschool-color-primary, --morfoschool-color-accent, optional --morfoschool-logo-url.
    ErrorEnvelope:
      type: object
      required: [code, message, requestId]
      properties:
        error: { type: string }
        code: { type: string }
        message: { type: string }
        requestId: { type: string }
        fieldErrors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
